<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Painel do Blog</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
        input, textarea, button { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #1b4332; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #2d6a4f; }
        .hidden { display: none; }
        .upload-box { border: 2px dashed #ccc; padding: 20px; text-align: center; margin-bottom: 1rem; border-radius: 8px; background: #f9f9f9; }
        #login-box { border: 1px solid #ddd; padding: 2rem; border-radius: 12px; background: #fcfcfc; }
        #error-box { display: none; background: #ffebeb; color: #d9534f; border: 1px solid #d9534f; padding: 10px; border-radius: 8px; margin-top: 10px; }
        h3 { margin-top: 2rem; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="login-box">
        <h2>Login do Admin</h2>
        <div id="error-box"></div>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <!-- ADMIN -->
    <div id="admin-panel" class="hidden">
        <h1>Gerenciar Blog</h1>
        <button onclick="logout()" style="background:#d9534f; margin-bottom:2rem;">Sair do Painel</button>

        <!-- SEÇÃO DE CONFIGURAÇÕES (EDITAR TUDO) -->
        <h3>⚙️ Configurações do Blog</h3>
        <input type="text" id="config-blog-name" placeholder="Nome do Blog (ex: jaun)">
        <input type="text" id="config-home-title" placeholder="Título da Home (deixe vazio para não aparecer)">
        <textarea id="config-home-intro" rows="2" placeholder="Texto de introdução da Home"></textarea>
        <input type="text" id="config-page-posts" placeholder="Título da página de Posts">
        <input type="text" id="config-page-rascunhos" placeholder="Título da página de Rascunhos">
        <input type="text" id="config-footer" placeholder="Texto do rodapé (deixe vazio para não aparecer)">
        <button onclick="salvarConfiguracoes()" style="background:#2d6a4f; margin-bottom:1rem;">Salvar Configurações</button>
        <hr>

        <!-- POSTS -->
        <h3>📝 Adicionar Novo Post</h3>
        <input type="text" id="post-titulo" placeholder="Título do post">
        <input type="text" id="post-resumo" placeholder="Resumo curto">
        <div class="upload-box">
            <p>Upload da Imagem (PNG/JPG)</p>
            <input type="file" id="post-imagem" accept="image/*">
        </div>
        <div class="upload-box">
            <p>Upload do PDF (Opcional)</p>
            <input type="file" id="post-pdf" accept=".pdf">
        </div>
        <button onclick="salvarPost()">Publicar Post</button>
        <hr style="margin: 2rem 0;">

        <!-- RASCUNHOS -->
        <h3>🧵 Adicionar Novo Rascunho</h3>
        <textarea id="rascunho-texto" rows="3" placeholder="Digite seu texto aqui..."></textarea>
        <div class="upload-box">
            <p>Upload de Ilustrações (PNG/JPG)</p>
            <input type="file" id="rascunho-imagens" accept="image/*" multiple>
        </div>
        <button onclick="salvarRascunho()">Publicar Rascunho</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vvrjpofqkksemwmqwxyi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2cmpwb2Zxa2tzZW13bXF3eHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjUwODIsImV4cCI6MjA5Nzc0MTA4Mn0.0EPKmEfvCscMaWxbXfsou5GestDWDPALJrhshIj9nww';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function mostrarErro(msg) {
            const box = document.getElementById('error-box');
            box.style.display = 'block'; box.innerText = msg;
        }

        async function fazerLogin() {
            document.getElementById('error-box').style.display = 'none';
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            if(!email || !senha) { mostrarErro("Preencha e-mail e senha."); return; }
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: senha });
                if (error) { mostrarErro("Erro: " + error.message); return; }
                if(!data.user) { mostrarErro("Usuário não encontrado no Supabase."); return; }
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                carregarConfiguracoesAdmin(); // Carrega as configs assim que logar
            } catch (e) { mostrarErro("Erro de conexão: " + e.message); }
        }

        function logout() { supabaseClient.auth.signOut(); location.reload(); }

        // --- FUNÇÕES DE CONFIGURAÇÃO ---
        async function carregarConfiguracoesAdmin() {
            const { data, error } = await supabaseClient.from('config').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('config-blog-name').value = data.blog_name || 'jaun';
                document.getElementById('config-home-title').value = data.home_title || '';
                document.getElementById('config-home-intro').value = data.home_intro || '';
                document.getElementById('config-page-posts').value = data.page_title_posts || '';
                document.getElementById('config-page-rascunhos').value = data.page_title_rascunhos || '';
                document.getElementById('config-footer').value = data.footer_text || '';
            }
        }

        async function salvarConfiguracoes() {
            await supabaseClient.from('config').upsert({ 
                id: 1, 
                blog_name: document.getElementById('config-blog-name').value || 'jaun',
                home_title: document.getElementById('config-home-title').value,
                home_intro: document.getElementById('config-home-intro').value,
                page_title_posts: document.getElementById('config-page-posts').value,
                page_title_rascunhos: document.getElementById('config-page-rascunhos').value,
                footer_text: document.getElementById('config-footer').value
            });
            alert('Configurações salvas! Vá no Blog, dê um F5 e veja as mudanças.');
        }

        // --- FUNÇÕES DE POSTAGEM ---
        async function salvarPost() {
            const titulo = document.getElementById('post-titulo').value;
            const resumo = document.getElementById('post-resumo').value;
            let imgUrl = '', pdfUrl = '';
            const fileImg = document.getElementById('post-imagem').files[0];
            if(fileImg) {
                const { data, error } = await supabaseClient.storage.from('uploads').upload(`post_img_${Date.now()}.png`, fileImg);
                if(!error) { const { data: url } = supabaseClient.storage.from('uploads').getPublicUrl(data.path); imgUrl = url.publicUrl; }
            }
            const filePdf = document.getElementById('post-pdf').files[0];
            if(filePdf) {
                const { data, error } = await supabaseClient.storage.from('uploads').upload(`post_pdf_${Date.now()}.pdf`, filePdf);
                if(!error) { const { data: url } = supabaseClient.storage.from('uploads').getPublicUrl(data.path); pdfUrl = url.publicUrl; }
            }
            const hoje = new Date().toISOString().slice(0,10);
            await supabaseClient.from('posts').insert([{ titulo, resumo, imagem_url: imgUrl, pdf_url: pdfUrl, data: hoje, likes: 0 }]);
            alert('Post publicado! Atualize seu blog.');
            location.reload();
        }

        async function salvarRascunho() {
            const texto = document.getElementById('rascunho-texto').value;
            let imagensUrls = [];
            const files = document.getElementById('rascunho-imagens').files;
            for(let file of files) {
                const { data, error } = await supabaseClient.storage.from('uploads').upload(`rasc_img_${Date.now()}_${file.name}`, file);
                if(!error) {
                    const { data: url } = supabaseClient.storage.from('uploads').getPublicUrl(data.path);
                    imagensUrls.push(url.publicUrl);
                }
            }
            const hoje = new Date().toISOString().slice(0,10);
            await supabaseClient.from('rascunhos').insert([{ texto, imagens: imagensUrls, data: hoje, likes: 0 }]);
            alert('Rascunho publicado!');
            location.reload();
        }
    </script>
</body>
</html>
